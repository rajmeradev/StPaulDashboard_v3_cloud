<body>
  <div id="root"></div>
  <div id="errordump"
    style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:9999; color:red; font-size:20px; font-family:monospace; background:black; padding:20px; border:2px solid red; display:none;">
  </div>
  <script>
    window.addEventListener('error', function (e) {
      document.getElementById('errordump').style.display = 'block';
      document.getElementById('errordump').innerHTML += '<br/>ERROR: ' + e.message;
    });
    window.addEventListener('unhandledrejection', function (e) {
      document.getElementById('errordump').style.display = 'block';
      document.getElementById('errordump').innerHTML += '<br/>PROMISE: ' + e.reason;
    });
  </script>
</body>

</html>
